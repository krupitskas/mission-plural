<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Plural</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        color: #e0e0e0;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #overlay {
        position: fixed;
        top: 20px;
        left: 20px;
        font-size: 12px;
        opacity: 0.6;
        pointer-events: none;
        line-height: 1.6;
      }
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        text-align: center;
        padding: 40px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div>MISSION PLURAL v0.1</div>
      <div id="stats"></div>
    </div>
    <div id="error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
